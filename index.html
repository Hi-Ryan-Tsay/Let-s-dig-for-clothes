<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>負責任捐贈問答挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        earth: {
                            100: '#F5F5DC', 
                            200: '#E8E4C9',
                            600: '#8B7355', 
                            800: '#5C4033', 
                        },
                        leaf: {
                            500: '#4CAF50',
                            600: '#388E3C', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .hidden-screen { display: none !important; }
        body { user-select: none; }
        
        /* 連連看答錯時的震動特效 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-earth-100 text-earth-800 font-sans min-h-screen flex flex-col">

    <div id="counter-display" class="absolute top-4 right-6 text-lg font-bold bg-white/60 px-4 py-2 rounded-full shadow-sm text-earth-600 border border-earth-200">
        累積參與人次：<span id="total-players">0</span> 人
    </div>

    <main class="flex-grow flex items-center justify-center p-4">
        
        <div id="screen-home" class="max-w-2xl w-full text-center space-y-8 bg-white p-10 rounded-3xl shadow-xl border-t-8 border-leaf-600">
            <h1 class="text-4xl md:text-5xl font-extrabold text-earth-800 leading-tight">
                衣起挖寶<br><span class="text-3xl text-earth-600">負責任捐贈挑戰賽</span>
            </h1>
            <p class="text-xl text-gray-600">完成 3 題實境問答，賺取額外的投球機會！</p>
            <button onclick="startGame()" class="w-full md:w-auto mt-6 bg-leaf-600 hover:bg-leaf-500 text-white text-2xl font-bold py-5 px-12 rounded-2xl shadow-lg transform transition active:scale-95">
                開始挑戰 🚀
            </button>
        </div>

        <div id="screen-quiz" class="hidden-screen max-w-3xl w-full bg-white p-8 md:p-10 rounded-3xl shadow-xl">
            <div class="flex justify-between items-center mb-6 border-b-2 border-earth-200 pb-4">
                <span class="text-xl font-bold text-earth-600">進度：<span id="question-progress">1/3</span></span>
                <span class="text-xl font-bold text-leaf-600">目前得分：<span id="current-score">0</span></span>
            </div>
            
            <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-earth-800 mb-2 leading-snug">
                </h2>
            
            <p id="matching-hint" class="hidden-screen text-earth-600 font-bold mb-6 bg-earth-100 p-2 rounded-lg text-center">
                💡 遊戲提示：請先點擊左側項目，再點擊右側對應項目進行配對！
            </p>

            <div id="options-container" class="space-y-4 mt-6">
                </div>
        </div>

        <div id="screen-result" class="hidden-screen max-w-2xl w-full text-center space-y-8 bg-white p-10 rounded-3xl shadow-xl border-t-8 border-earth-800">
            <h1 class="text-4xl font-extrabold text-earth-800">挑戰完成！ 🎉</h1>
            
            <div class="bg-earth-100 p-8 rounded-2xl">
                <p class="text-2xl mb-4 text-earth-600">您共答對了</p>
                <p class="text-7xl font-black text-leaf-600 mb-4"><span id="final-score">0</span> <span class="text-3xl text-earth-800">題</span></p>
                <p class="text-2xl font-bold text-red-600">👉 可獲得 <span id="extra-balls" class="text-4xl underline">0</span> 顆額外的球！</p>
            </div>

            <p class="text-gray-500 text-sm mt-4">（請工作人員確認分數後再點擊下方按鈕）</p>
            
            <button onclick="resetGame()" class="w-full bg-earth-800 hover:bg-earth-600 text-white text-xl font-bold py-5 px-8 rounded-2xl shadow-lg transform transition active:scale-95 border-4 border-dashed border-earth-200">
                ✅ 工作人員確認完畢，換下一位
            </button>
        </div>
    </main>

    <div id="feedback-modal" class="hidden-screen fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white max-w-2xl w-full rounded-3xl shadow-2xl overflow-hidden transform scale-100 transition-transform">
            <div id="modal-header" class="px-8 py-6 text-white text-center">
                <h3 id="modal-title" class="text-4xl font-black">答對了！</h3>
            </div>
            <div class="p-8">
                <div class="mb-8">
                    <h4 class="text-lg font-bold text-gray-500 mb-2">💡 觀念解析：</h4>
                    <p id="modal-explanation" class="text-2xl font-semibold text-earth-800 leading-relaxed"></p>
                </div>
                <button onclick="nextQuestion()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 text-xl font-bold py-4 rounded-xl transition active:scale-95">
                    我知道了，下一題 ➡️
                </button>
            </div>
        </div>
    </div>

    <script>
        // 題庫資料：新增了連連看題型 (type: 'matching')
        const allQuestions = [
            {
                type: "matching",
                question: "連連看：請將下列衣物連到最適合的歸宿",
                pairs: [
                    { left: "全新未拆封內衣褲", right: "災區" },
                    { left: "八成新素色外套", right: "二手商店" },
                    { left: "泛黃破洞的T恤", right: "舊衣回收或丟棄" }
                ],
                explanation: "不同的衣物狀況有最適合的歸宿，換位思考最重要！"
            },
            {
                type: "choice",
                question: "是非題：聽說災區很缺物資，所以我把衣櫃裡起毛球但還能穿的舊T-shirt全捐過去，這樣算是雪中送炭嗎？",
                options: ["⭕ 是的", "❌ 錯的"],
                answer: "❌ 錯的",
                explanation: "災區無水電與人力整理，不需要清庫存的淘汰衣物。"
            },
            {
                type: "choice",
                question: "是非題：二手衣循環的核心觀念是：「只要這件衣服沒破洞，就可以捐到二手商店賣」。",
                options: ["⭕ 是的", "❌ 錯的"],
                answer: "❌ 錯的",
                explanation: "核心觀念是「換位思考：如果你是買家，你會想花錢買它嗎？」若是奇裝異服或過舊，只會徒增店員挑選的心力。"
            },
            {
                type: "choice",
                question: "如果你想幫助災區，但你不確定當地現在的天氣和具體狀況，你應該怎麼做最負責任？",
                options: [
                    "(A) 只要是衣服就先裝箱寄過去再說，總會有人需要。",
                    "(B) 寄最貴的羊毛大衣，保暖最重要。",
                    "(C) 先實際了解當地情況與需求清單後，再挑選具備高機動性、適合當地氣候的乾淨衣物。"
                ],
                answer: "(C) 先實際了解當地情況與需求清單後，再挑選具備高機動性、適合當地氣候的乾淨衣物。",
                explanation: "不盲目寄送才是負責任的表現。"
            },
            {
                type: "choice",
                question: "準備把衣服捐給二手商店前，最應該問自己的一句話是什麼？",
                options: [
                    "(A) 「送出去的這件衣物，如果我自己是買家，我會想買嗎？」",
                    "(B) 「這件衣服丟掉好可惜，不如給別人穿吧？」",
                    "(C) 「二手店有免費洗衣機，沒洗過的衣服也可以捐吧？」"
                ],
                answer: "(A) 「送出去的這件衣物，如果我自己是買家，我會想買嗎？」",
                explanation: "「換位思考」是負責任捐贈的靈魂。確保衣服狀況良好，它才有機會再次循環。"
            }
        ];

        // 系統狀態變數
        let currentSessionQuestions = [];
        let currentQuestionIndex = 0;
        let currentScore = 0;
        let isAnswerLocked = false;
        const totalQuestionsPerGame = 3;

        // 連連看專屬變數
        let selectedLeftBtn = null;
        let selectedRightBtn = null;
        let matchedPairsCount = 0;
        let currentQuestionMistakes = 0;

        window.onload = () => { updateTotalPlayersDisplay(); };

        function updateTotalPlayersDisplay() {
            let total = localStorage.getItem('thriftStoreGamePlayers') || 0;
            document.getElementById('total-players').innerText = total;
        }

        function incrementTotalPlayers() {
            let total = parseInt(localStorage.getItem('thriftStoreGamePlayers') || 0);
            localStorage.setItem('thriftStoreGamePlayers', total + 1);
            updateTotalPlayersDisplay();
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function hideAllScreens() {
            document.getElementById('screen-home').classList.add('hidden-screen');
            document.getElementById('screen-quiz').classList.add('hidden-screen');
            document.getElementById('screen-result').classList.add('hidden-screen');
            document.getElementById('counter-display').classList.add('hidden-screen');
        }

        function startGame() {
            hideAllScreens();
            document.getElementById('screen-quiz').classList.remove('hidden-screen');
            currentSessionQuestions = shuffleArray(allQuestions).slice(0, totalQuestionsPerGame);
            currentQuestionIndex = 0;
            currentScore = 0;
            loadQuestion();
        }

        function loadQuestion() {
            isAnswerLocked = false;
            document.getElementById('current-score').innerText = currentScore;
            document.getElementById('question-progress').innerText = `${currentQuestionIndex + 1} / ${totalQuestionsPerGame}`;
            
            const q = currentSessionQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerText = q.question;
            const optionsContainer = document.getElementById('options-container');
            const matchingHint = document.getElementById('matching-hint');
            optionsContainer.innerHTML = '';
            
            if (q.type === 'choice') {
                matchingHint.classList.add('hidden-screen');
                optionsContainer.className = "space-y-4 mt-6";
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left text-xl font-semibold bg-earth-100 hover:bg-earth-200 text-earth-800 p-5 rounded-2xl border-2 border-earth-200 transition active:scale-95";
                    btn.innerText = opt;
                    btn.onclick = () => handleChoiceAnswer(opt, q.answer, q.explanation, btn);
                    optionsContainer.appendChild(btn);
                });
            } else if (q.type === 'matching') {
                matchingHint.classList.remove('hidden-screen');
                optionsContainer.className = "grid grid-cols-2 gap-4 mt-6";
                renderMatchingGame(q, optionsContainer);
            }
        }

        /* ========== 單選題邏輯 ========== */
        function handleChoiceAnswer(selectedOption, correctAnswer, explanation, clickedBtn) {
            if (isAnswerLocked) return;
            isAnswerLocked = true;
            const isCorrect = (selectedOption === correctAnswer);
            
            clickedBtn.classList.remove('bg-earth-100', 'border-earth-200', 'hover:bg-earth-200');
            if (isCorrect) {
                currentScore++;
                document.getElementById('current-score').innerText = currentScore;
                clickedBtn.classList.add('bg-leaf-500', 'text-white', 'border-leaf-600');
            } else {
                clickedBtn.classList.add('bg-red-500', 'text-white', 'border-red-600');
            }

            setTimeout(() => { showFeedbackModal(isCorrect, explanation); }, 300);
        }

        /* ========== 連連看邏輯 ========== */
        function renderMatchingGame(q, container) {
            selectedLeftBtn = null;
            selectedRightBtn = null;
            matchedPairsCount = 0;
            currentQuestionMistakes = 0;

            const leftCol = document.createElement('div');
            leftCol.className = "space-y-3";
            const rightCol = document.createElement('div');
            rightCol.className = "space-y-3";
            
            container.appendChild(leftCol);
            container.appendChild(rightCol);

            let leftItems = q.pairs.map(p => ({ text: p.left, target: p.right }));
            let rightItems = q.pairs.map(p => ({ text: p.right, target: p.left }));
            
            leftItems = shuffleArray(leftItems);
            rightItems = shuffleArray(rightItems);

            leftItems.forEach(item => {
                const btn = createMatchBtn(item.text, 'left', item.target);
                leftCol.appendChild(btn);
            });
            rightItems.forEach(item => {
                const btn = createMatchBtn(item.text, 'right', item.target);
                rightCol.appendChild(btn);
            });
        }

        function createMatchBtn(text, side, targetMatch) {
            const btn = document.createElement('button');
            btn.className = "w-full text-center sm:text-left text-base sm:text-lg font-semibold bg-earth-100 text-earth-800 p-4 rounded-xl border-2 border-earth-200 transition-all duration-200";
            btn.innerText = text;
            btn.dataset.side = side;
            btn.dataset.text = text;
            btn.dataset.target = targetMatch;
            btn.onclick = () => handleMatchClick(btn);
            return btn;
        }

        function handleMatchClick(btn) {
            if (btn.disabled || isAnswerLocked) return;
            const side = btn.dataset.side;
            
            // 處理選取外框樣式
            if (side === 'left') {
                if (selectedLeftBtn) selectedLeftBtn.classList.remove('ring-4', 'ring-earth-600', 'border-earth-600');
                selectedLeftBtn = btn;
            } else {
                if (selectedRightBtn) selectedRightBtn.classList.remove('ring-4', 'ring-earth-600', 'border-earth-600');
                selectedRightBtn = btn;
            }
            btn.classList.add('ring-4', 'ring-earth-600', 'border-earth-600');
            
            // 兩邊都選了就進行比對
            if (selectedLeftBtn && selectedRightBtn) {
                checkMatchPair();
            }
        }

        function checkMatchPair() {
            const left = selectedLeftBtn;
            const right = selectedRightBtn;
            
            selectedLeftBtn = null;
            selectedRightBtn = null;
            
            if (left.dataset.target === right.dataset.text) {
                // 配對成功
                [left, right].forEach(b => {
                    b.classList.replace('bg-earth-100', 'bg-leaf-500');
                    b.classList.replace('text-earth-800', 'text-white');
                    b.classList.remove('ring-4', 'ring-earth-600', 'border-earth-600');
                    b.disabled = true;
                });
                
                matchedPairsCount++;
                const currentQ = currentSessionQuestions[currentQuestionIndex];
                
                if (matchedPairsCount === currentQ.pairs.length) {
                    isAnswerLocked = true;
                    const isPerfectMatch = (currentQuestionMistakes === 0);
                    if (isPerfectMatch) {
                        currentScore++;
                        document.getElementById('current-score').innerText = currentScore;
                    }
                    setTimeout(() => { showFeedbackModal(isPerfectMatch, currentQ.explanation); }, 500);
                }
            } else {
                // 配對失敗，震動並閃爍紅色
                currentQuestionMistakes++;
                [left, right].forEach(b => {
                    b.classList.replace('bg-earth-100', 'bg-red-500');
                    b.classList.replace('text-earth-800', 'text-white');
                    b.classList.add('shake-animation');
                });
                
                setTimeout(() => {
                    [left, right].forEach(b => {
                        b.classList.replace('bg-red-500', 'bg-earth-100');
                        b.classList.replace('text-white', 'text-earth-800');
                        b.classList.remove('shake-animation', 'ring-4', 'ring-earth-600', 'border-earth-600');
                    });
                }, 800);
            }
        }

        /* ========== 共通顯示邏輯 ========== */
        function showFeedbackModal(isCorrect, explanation) {
            const modal = document.getElementById('feedback-modal');
            const modalHeader = document.getElementById('modal-header');
            const modalTitle = document.getElementById('modal-title');
            
            if (isCorrect) {
                modalHeader.className = "px-8 py-6 text-white text-center bg-leaf-600";
                modalTitle.innerText = "⭕ 答對了！";
            } else {
                modalHeader.className = "px-8 py-6 text-white text-center bg-red-600";
                modalTitle.innerText = "❌ 哎呀，再想想！";
            }
            
            document.getElementById('modal-explanation').innerText = explanation;
            modal.classList.remove('hidden-screen');
        }

        function nextQuestion() {
            document.getElementById('feedback-modal').classList.add('hidden-screen');
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestionsPerGame) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            hideAllScreens();
            document.getElementById('screen-result').classList.remove('hidden-screen');
            document.getElementById('final-score').innerText = currentScore;
            document.getElementById('extra-balls').innerText = currentScore;
        }

        function resetGame() {
            incrementTotalPlayers();
            hideAllScreens();
            document.getElementById('screen-home').classList.remove('hidden-screen');
            document.getElementById('counter-display').classList.remove('hidden-screen');
        }
    </script>
</body>
</html>
